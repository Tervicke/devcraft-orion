services:
  tauras:
    container_name: tauras
    build:
      context: ./tauras
      dockerfile: Dockerfile.dev
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_started
    volumes:
      - ./tauras:/app
    ports:
      - 3000:3000

  kafka:
    container_name: kafka
    image: apache/kafka:4.2.0
    ports:
      - "9092:9092"

  mysql:
    image: mysql:8.0.45
    container_name: mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql-data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h localhost -uroot -pexample_password || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
  leo:
    container_name: leo
    build:
      context: ./leo
      dockerfile: Dockerfile.dev
    depends_on:
      tauras:
        condition: service_started
    volumes:
      - ./leo:/app
    ports:
      - 5173:5173
volumes:
  mysql-data:
